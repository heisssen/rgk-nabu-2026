let filter = 'all', search = '';

function initials(name) {
  const p = name.trim().split(/\s+/);
  return ((p[0]||'')[0] + (p[1]||'')[0]).toUpperCase();
}

function imgErr(el, txt) {
  el.parentNode.innerHTML = txt;
}

function render() {
  const list = document.getElementById('list');
  list.innerHTML = '';
  let n = 0;

  for (let i = 1; i <= 41; i++) {
    const c = C[i];
    if (!c) continue;
    const isRec  = REC.includes(i);
    const isWarn = !!c.warn;

    let show = true;
    if (filter === 'rec'   && !isRec)  show = false;
    if (filter === 'warn'  && !isWarn) show = false;
    if (filter === 'other' && isRec)   show = false;
    if (search && !c.name.toLowerCase().includes(search)) show = false;
    if (!show) continue;
    n++;

    const ini = initials(c.name);
    let avHtml;
    if (c.photo) {
      avHtml = `<div class="avatar" data-ini="${ini}"><img src="${c.photo}" alt="" loading="lazy" onerror="imgErr(this,'${ini}')"></div>`;
    } else {
      avHtml = `<div class="avatar">${ini}</div>`;
    }

    const bgs = [];
    if (isRec)  bgs.push(`<span class="badge b-rec">★ Рекомендований</span>`);
    if (isWarn) bgs.push(`<span class="badge b-warn">⚠ Зашквар</span>`);
    if (c.rgk)  bgs.push(`<span class="badge b-rgk">✓ Чинний РГК</span>`);

    let det = `<a class="pdf-link" href="${c.pdf}" target="_blank" onclick="event.stopPropagation()">📄 PDF-документи кандидата</a>`;

    if (c.bio) {
      det += `<div class="section">
        <div class="section-label">Автобіографія</div>
        <div class="section-body" id="b${i}">${c.bio.replace(/\n/g,'<br>')}</div>
        <button class="expand-btn" onclick="event.stopPropagation();exp('b${i}',this)">читати далі ↓</button>
      </div>`;
    }
    if (c.motiv) {
      det += `<div class="section">
        <div class="section-label">Мотиваційний лист</div>
        <div class="section-body" id="m${i}">${c.motiv.replace(/\n/g,'<br>')}</div>
        <button class="expand-btn" onclick="event.stopPropagation();exp('m${i}',this)">читати далі ↓</button>
      </div>`;
    }
    if (c.warn) {
      det += `<div class="warn-section">
        <div class="warn-label">⚠ Зашквари / Питання</div>
        <div class="warn-body">${c.warn.replace(/\n/g,'<br>')}</div>
      </div>`;
    }

    const el = document.createElement('div');
    el.className = 'item' + (isRec ? ' highlighted' : '');
    el.id = 'i' + i;
    el.innerHTML = `
      <div class="row" onclick="toggle(${i})">
        <div class="num">${i}</div>
        ${avHtml}
        <div class="info">
          <div class="name">${c.name}</div>
          <div class="org">${c.ngo}</div>
          <div class="badges">${bgs.join('')}</div>
        </div>
        <div class="arrow">▾</div>
      </div>
      <div class="detail"><div class="detail-inner">${det}</div></div>`;
    list.appendChild(el);
  }

  document.getElementById('count').textContent = `${n} із 41 кандидата`;
}

function toggle(i) {
  const item = document.getElementById('i' + i);
  const det  = item.querySelector('.detail');
  const inner = item.querySelector('.detail-inner');
  if (item.classList.contains('open')) {
    det.style.maxHeight = det.scrollHeight + 'px';
    requestAnimationFrame(() => requestAnimationFrame(() => { det.style.maxHeight = '0'; }));
    item.classList.remove('open');
  } else {
    item.classList.add('open');
    const h = inner.scrollHeight;
    det.style.maxHeight = h + 'px';
    det.addEventListener('transitionend', () => {
      if (item.classList.contains('open')) det.style.maxHeight = 'none';
    }, { once: true });
  }
}

function exp(id, btn) {
  const el = document.getElementById(id);
  el.classList.toggle('expanded');
  btn.textContent = el.classList.contains('expanded') ? 'згорнути ↑' : 'читати далі ↓';
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function doSearch(v) {
  search = v.toLowerCase();
  render();
}

// update warn count in button
const warnCount = Object.values(C).filter(c => c.warn).length;
document.getElementById('btn-warn').textContent = `Із зашкварами (${warnCount})`;

render();
</script>
